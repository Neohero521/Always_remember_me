<!-- 小说续写器UI模板，必须放在仓库根目录 -->
<div class="novel-writer-inner">
  <!-- 章节导入与管理 -->
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <div class="drawer-title-group">
        <i class="fa-solid fa-file-import drawer-icon"></i>
        <span>章节导入与管理</span>
      </div>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <div class="form-group">
        <label for="novel-file-upload" class="form-label">小说TXT文件</label>
        <input id="novel-file-upload" type="file" accept=".txt" class="form-control" />
      </div>
      <div class="form-row">
        <div class="form-group flex-2">
          <label for="chapter-regex-input" class="form-label">章节拆分正则</label>
          <input id="chapter-regex-input" type="text" class="form-control" placeholder="^\s*第\s*[0-9零一二三四五六七八九十百千]+\s*章.*$" />
          <p class="form-hint">默认适配「第X章」格式，可自定义修改</p>
        </div>
        <div class="form-group flex-1">
          <label for="send-delay-input" class="form-label">发送间隔(ms)</label>
          <input id="send-delay-input" type="number" min="50" step="10" class="form-control" value="100" />
          <p class="form-hint">数值越小发送越快</p>
        </div>
      </div>
      <div class="form-group">
        <label for="send-template-input" class="form-label">发送命令模板</label>
        <input id="send-template-input" type="text" class="form-control" value="/sendas name={{char}} {{pipe}}" />
        <p class="form-hint">变量：{{char}}=当前角色名，{{pipe}}=章节内容</p>
      </div>
      <div class="action-row">
        <input id="parse-chapter-btn" class="menu_button menu_button--primary" type="submit" value="解析章节" />
      </div>
      <hr class="sysHR" />
      <div class="list-header">
        <span class="list-title">章节列表</span>
        <div class="action-group">
          <input id="select-all-btn" class="menu_button menu_button--sm" type="submit" value="全选" />
          <input id="unselect-all-btn" class="menu_button menu_button--sm" type="submit" value="全不选" />
        </div>
      </div>
      <div id="novel-chapter-list" class="chapter-list-container">
        <p class="empty-tip">请上传小说文件并点击「解析章节」</p>
      </div>
      <div class="progress-group">
        <p id="novel-import-status" class="progress-text"></p>
        <div class="progress-bar">
          <div id="novel-import-progress" class="progress-fill"></div>
        </div>
      </div>
      <div class="action-row gap-10">
        <input id="stop-send-btn" class="menu_button menu_button--danger" type="submit" value="停止发送" />
        <input id="import-selected-btn" class="menu_button menu_button--primary" type="submit" value="导入选中章节" />
        <input id="import-all-btn" class="menu_button menu_button--secondary" type="submit" value="导入全部章节" />
      </div>
    </div>
  </div>

  <!-- 小说续写生成 -->
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <div class="drawer-title-group">
        <i class="fa-solid fa-pen-to-square drawer-icon"></i>
        <span>小说续写生成</span>
      </div>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <div class="form-row">
        <div class="form-group flex-2">
          <label for="write-chapter-select" class="form-label">选择续写基准章节</label>
          <select id="write-chapter-select" class="form-control">
            <option value="">请先解析章节</option>
          </select>
        </div>
        <div class="form-group flex-1">
          <label for="write-word-count" class="form-label">续写字数</label>
          <input id="write-word-count" type="number" min="500" max="10000" step="100" class="form-control" value="2000" />
          <p class="form-hint">范围：500-10000字</p>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">基准章节内容（可直接编辑修改）</label>
        <textarea id="write-chapter-content" rows="10" class="form-control" placeholder="请先选择上方的基准章节..." readonly></textarea>
      </div>
      <div class="action-row gap-10">
        <input id="write-generate-btn" class="menu_button menu_button--primary" type="submit" value="生成续写章节" />
        <input id="write-stop-btn" class="menu_button menu_button--danger" type="submit" value="停止生成" />
      </div>
      <div class="progress-group">
        <p id="write-status" class="progress-text"></p>
      </div>
      <hr class="sysHR" />
      <div class="form-group">
        <label class="form-label">续写生成结果</label>
        <textarea id="write-content-preview" rows="12" class="form-control" placeholder="生成的续写章节内容将显示在这里..."></textarea>
        <div class="action-group mt-8">
          <input id="write-copy-btn" class="menu_button menu_button--sm" type="submit" value="复制内容" />
          <input id="write-send-btn" class="menu_button menu_button--primary" type="submit" value="发送到对话框" />
          <input id="write-clear-btn" class="menu_button menu_button--sm menu_button--danger" type="submit" value="清空内容" />
        </div>
      </div>
    </div>
  </div>

  <!-- 模板示例模块（官方模板要求） -->
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>模板示例模块</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <div class="flex-container gap5">
        <input id="my_button" class="menu_button" type="submit" value="示例按钮" />
      </div>
      <div class="flex-container gap5 mt-8">
        <input id="example_setting" type="checkbox" />
        <label for="example_setting">模板示例复选框</label>
      </div>
    </div>
  </div>
</div>
