<!-- settings.html -->
<div class="extension-settings" data-extension="Always_remember_me">
    <h2 class="extension-title">小说章节导入助手</h2>
    
    <!-- 导入按钮 -->
    <button id="open-import-modal" class="btn btn-primary">
        打开小说章节导入面板
    </button>
    
    <!-- 这里可以添加其他设置选项 -->
    <div class="setting-item">
        <label>
            <input type="checkbox" id="auto-split" checked>
            自动按章节拆分
        </label>
    </div>
    
    <!-- 导入面板容器（初始隐藏） -->
    <div id="import-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>选择小说文件</h3>
            <input type="file" id="txt-file" accept=".txt" multiple>
            <button id="import-button">导入选中的章节</button>
        </div>
    </div>
</div>

<script>
// 初始化导入面板功能
$(document).ready(() => {
    // 打开导入面板
    $("#open-import-modal").on("click", () => {
        $("#import-modal").css("display", "block");
    });
    
    // 关闭导入面板
    $(".close").on("click", () => {
        $("#import-modal").css("display", "none");
    });
    
    // 点击模态框外部关闭
    $(window).on("click", (event) => {
        if (event.target == $("#import-modal")[0]) {
            $("#import-modal").css("display", "none");
        }
    });
    
    // 文件导入功能（示例）
    $("#import-button").on("click", () => {
        const files = $("#txt-file")[0].files;
        if (files.length > 0) {
            alert(`即将导入${files.length}个文件...`);
            // 这里添加实际的导入逻辑
        } else {
            alert("请先选择TXT文件！");
        }
    });
});
</script>
